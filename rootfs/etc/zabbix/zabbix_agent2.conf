# Zabbix Agent2 — crunchtools/zabbix-agent2
# Override settings by mounting files to /etc/zabbix/zabbix_agent2.d/

Hostname=localhost
Server=127.0.0.1
ServerActive=127.0.0.1

# Include directory for per-host config overrides
Include=/etc/zabbix/zabbix_agent2.d/*.conf

# Docker/Podman monitoring via socket
Plugins.Docker.Endpoint=unix:///var/run/docker.sock
